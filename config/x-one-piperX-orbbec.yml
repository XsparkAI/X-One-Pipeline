INFO_LEVEL: INFO
collect:
  task_name: null
  type: x-one-piperX-orbbec
  save_dir: ./data/
  save_format: hdf5
  start_episode: 0
  num_episode: 100
  save_freq: 30
  move_check: true
  use_footpedal: false
  footpedal_serial: /dev/pedal
robot:
  type: x-one-piperX-orbbec
  use_node: true
  init_qpos:
    left_arm:
    - 0
    - 0.0
    - 0.0
    - 0
    - 0
    - 0
    left_gripper: 1.0
    right_arm:
    - 0
    - 0
    - 0
    - 0
    - 0
    - 0
    right_gripper: 1.0
  control_mode: position
  ROBOT_CAN:
    left_arm: can_left
    right_arm: can_right
  CAMERA_SERIALS:
    head: CP2N163000EK
    left_wrist: CV2L360000P9
    right_wrist: CV2L360000GM
  CAMERA_COLOR:
    auto_exposure: false
    exposure: 90
    gain: 0
    auto_white_balance: false
    white_balance: 5700
    brightness: 0
    contrast: 50
    saturation: 64
    hue: 0
    gamma: 300
    sharpness: 50
    by_camera: {}
  bias:
    left_arm:
      gripper: -0.08
    right_arm:
      gripper: -0.08
