INFO_LEVEL: INFO # DEBUG, INFO, ERROR

collect:
  task_name: null
  type: x-one
  save_dir: ./data
  save_format: hdf5
  start_episode: 0
  num_episode: 100
  save_freq: 30  # in Hz
  move_check: true
  use_footpedal: true
  footpedal_serial: "/dev/pedal" # only read if use_footpedal is true, default to "/dev/pedal"

robot:
  type: x-one
  use_node: true
  init_qpos:
    left_arm: [0, 0, 0, 0, 0, 0]
    left_gripper: 1.0
    right_arm: [0, 0, 0, 0, 0, 0]
    right_gripper: 1.0
  control_mode: position
  ROBOT_CAN:
    left_arm: can0
    right_arm: can2
  CAMERA_SERIALS:
    head: "/dev/head_camera"
    left_wrist: "/dev/left_wrist_camera"
    right_wrist: "/dev/right_wrist_camera"
  bias:
    left_arm:
      gripper: -0.01
    right_arm:
      gripper: -0.01
